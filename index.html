const IDEOLOGY_COLOR = {

  moderate:     '#a78bfa',   // violet

/* ============================================================
 * 1. 유틸: 페어링, 통계, 프롬프트
 * ============================================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pairAgents(agents) {
  const s = shuffle(agents);
  const pairs = [];
  for (let i = 0; i < s.length - 1; i += 2) pairs.push([s[i], s[i + 1]]);
  return pairs;
}

function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

/** 양극화 지수: 입장의 표준편차 */
function polarization(agents) {
  const xs = agents.map(a => a.attitude);
  const mean = xs.reduce((s, v) => s + v, 0) / xs.length;
  const variance = xs.reduce((s, v) => s + (v - mean) ** 2, 0) / xs.length;
  return Math.sqrt(variance);
}

function buildPrompt(topic, A, B) {
  const memSnip = (a) => (a.memories.length ? a.memories.slice(-2).map((m, i) => `   ${i + 1}) ${m}`).join('\n') : '   (없음)');
  return `당신은 한국 사회 두 시민의 실시간 대화를 시뮬레이션합니다. 두 사람의 페르소나·현재 입장·기억을 반영해 자연스러운 한국어 대화를 만들고, 대화 후 변화된 입장을 평가하세요.

[주제]
헤드라인: ${topic.headline}
내용 요약: ${topic.content}
질문: ${topic.question} (점수 범위 -5 ~ +5, 정수)

[에이전트 A] ${A.name} (${A.age}세, ${A.occupation}, ${IDEOLOGY_LABEL[A.ideology]})
배경: ${A.bio}
현재 입장: ${A.attitude}
최근 기억:
${memSnip(A)}

[에이전트 B] ${B.name} (${B.age}세, ${B.occupation}, ${IDEOLOGY_LABEL[B.ideology]})
배경: ${B.bio}
현재 입장: ${B.attitude}
최근 기억:
${memSnip(B)}

[작성 규칙]
1. 두 사람이 일상적인 한국어 말투로 4~6턴 정도 대화 (A→B→A→B…). 각 turn 1~2 문장.
2. 페르소나·기존 입장과 일관되게, 그러나 상대 발언에 어느 정도 반응.
3. 대화 직후 각자의 새 입장 점수 산출:
   - 통상 변화 없음 또는 ±1
   - 강하게 설득당했을 때만 ±2 (드물게)
   - 페르소나에 반하는 급격한 변화는 금지
4. 각자 이번 대화에서 새로 알게 된/느낀 점을 한 문장(40자 이내) 메모.

[출력]
반드시 아래 JSON만 출력. 코드펜스나 설명 금지.
{
  "dialogue": [{"speaker":"A","text":"..."},{"speaker":"B","text":"..."}],
  "a_new_attitude": <-5..5 정수>,
  "a_memory": "<한 문장>",
  "a_reason": "<한 줄 이유>",
  "b_new_attitude": <-5..5 정수>,
  "b_memory": "<한 문장>",
  "b_reason": "<한 줄 이유>"
}`;
}

function safeParseJSON(text) {
  if (!text) return null;
  let t = text.trim();
  // strip code fences
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/```$/g, '').trim();
  // try direct
  try { return JSON.parse(t); } catch {}
  // try to extract first {...}
  const m = t.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

/* ============================================================
 * 2. API 호출
 * ============================================================ */
async function callBackend({ scriptUrl, apiKey, prompt, useServerKey }) {
  if (!scriptUrl) throw new Error('Apps Script URL이 없습니다.');
  const body = { action: 'generate', prompt, json: true, temperature: 0.8 };
  if (!useServerKey) body.apiKey = apiKey;
  const res = await fetch(scriptUrl, {
    method: 'POST',
    // text/plain로 보내 preflight 회피
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '백엔드 오류');
  return data.text;
}

function AttitudeChart({ agents, currentRound }) {
  const data = useMemo(() => {
    const rows = [];
    const maxR = Math.max(currentRound, ...agents.flatMap(a => a.attitudeHistory.map(h => h.round)));
    for (let r = 0; r <= maxR; r++) {
      const pt = { round: r };
      agents.forEach(a => {
        const h = a.attitudeHistory.find(h => h.round === r);
        if (h) pt[a.name] = h.value;
      });
      rows.push(pt);
    }
    return rows;
  }, [agents, currentRound]);

  return (
    <div className="panel rounded-lg p-5">
      <div className="flex items-baseline justify-between mb-3">
        <div className="flex items-baseline gap-3">
          <span className="font-mono text-[11px] tracking-widest text-[var(--amber)]">04 / TRAJECTORIES</span>
          <span className="text-sm text-[var(--text-dim)]">라운드별 태도 변화</span>
        </div>
        <div className="font-mono text-xs text-[var(--text-faint)]">
          σ = <span className="text-[var(--amber)]">{polarization(agents).toFixed(2)}</span> (양극화)
        </div>
      </div>
      <div className="h-[320px]">
        <ResponsiveContainer width="100%" height="100%">
          <LineChart data={data} margin={{ top: 8, right: 16, bottom: 8, left: -12 }}>
            <CartesianGrid stroke="#283149" strokeDasharray="2 4" />
            <XAxis dataKey="round" stroke="#6b7587" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }}
              label={{ value: 'round', position: 'insideBottom', offset: -4, fill: '#6b7587', fontSize: 10 }} />
            <YAxis domain={[-5, 5]} stroke="#6b7587" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} ticks={[-5,-3,0,3,5]} />
            <ReferenceLine y={0} stroke="#6b7587" strokeDasharray="3 3" />
            <Tooltip contentStyle={{ background: '#131a2b', border: '1px solid #283149', fontSize: 12 }} />
            {agents.map(a => (
              <Line key={a.id} type="monotone" dataKey={a.name}
                stroke={IDEOLOGY_COLOR[a.ideology]} strokeWidth={1.5}
                dot={{ r: 2 }} activeDot={{ r: 4 }} connectNulls
                isAnimationActive={false} />
            ))}
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div className="mt-2 flex gap-4 text-[10px] font-mono text-[var(--text-faint)]">
        <span><span className="inline-block w-3 h-[2px] mr-1 align-middle" style={{ background: IDEOLOGY_COLOR.progressive }}></span>진보</span>
        <span><span className="inline-block w-3 h-[2px] mr-1 align-middle" style={{ background: IDEOLOGY_COLOR.moderate }}></span>중도</span>
        <span><span className="inline-block w-3 h-[2px] mr-1 align-middle" style={{ background: IDEOLOGY_COLOR.conservative }}></span>보수</span>
      </div>
    </div>
  );
}

function ConversationLog({ conversations, agents }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [conversations.length]);

  const findAgent = (id) => agents.find(a => a.id === id);

  return (
    <div className="panel rounded-lg p-5 flex flex-col" style={{ height: '560px' }}>
      <div className="flex items-baseline gap-3 mb-3">
        <span className="font-mono text-[11px] tracking-widest text-[var(--amber)]">05 / DIALOGUES</span>
        <span className="text-sm text-[var(--text-dim)]">실시간 대화 로그</span>
        <span className="ml-auto font-mono text-[10px] text-[var(--text-faint)]">{conversations.length} conversations</span>
      </div>
      <div ref={ref} className="flex-1 overflow-y-auto scroll-thin pr-2 space-y-4">
        {conversations.length === 0 && (
          <div className="text-center text-[var(--text-faint)] text-sm pt-12 italic font-display">
            시뮬레이션을 시작하면 대화가 여기에 표시됩니다.
          </div>
        )}
        {conversations.map((c) => {
          const A = findAgent(c.agentAId);
          const B = findAgent(c.agentBId);
          if (!A || !B) return null;
          return (
            <div key={c.key} className="fade-in panel-2 rounded p-3">
              <div className="flex items-center gap-2 text-[10px] font-mono text-[var(--text-faint)] mb-2">
                <span className="text-[var(--amber)]">R{c.round}</span>
                <span>·</span>
                <span style={{ color: IDEOLOGY_COLOR[A.ideology] }}>{A.name}</span>
                <span>↔</span>
                <span style={{ color: IDEOLOGY_COLOR[B.ideology] }}>{B.name}</span>
                <span className="ml-auto">
                  Δ {A.name.slice(0,1)}:{c.aDelta > 0 ? '+' : ''}{c.aDelta} ·
                  &nbsp;{B.name.slice(0,1)}:{c.bDelta > 0 ? '+' : ''}{c.bDelta}
                </span>
              </div>
              <div className="space-y-1.5 text-sm leading-relaxed">
                {c.dialogue.map((d, i) => {
                  const speaker = d.speaker === 'A' ? A : B;
                  return (
                    <div key={i} className="flex gap-2">
                      <span className="font-medium flex-shrink-0" style={{ color: IDEOLOGY_COLOR[speaker.ideology] }}>
                        {speaker.name}
                      </span>
                      <span className="text-[var(--text)]">{d.text}</span>
                    </div>
                  );
                })}
              </div>
              {(c.aReason || c.bReason) && (
                <div className="mt-2 pt-2 border-t border-[var(--border)] text-[11px] text-[var(--text-faint)] italic space-y-0.5">
                  {c.aReason && <div>· {A.name}: {c.aReason}</div>}
                  {c.bReason && <div>· {B.name}: {c.bReason}</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StatusLog({ logs }) {
  return (
    <div className="panel rounded-lg p-3 font-mono text-[11px] text-[var(--text-dim)] h-32 overflow-y-auto scroll-thin">
      {logs.length === 0 && <div className="text-[var(--text-faint)] italic">시스템 로그…</div>}
      {logs.map((l, i) => (
        <div key={i}>
          <span className="text-[var(--text-faint)]">[{l.t}]</span>{' '}
          <span className={l.kind === 'err' ? 'text-rose-400' : l.kind === 'ok' ? 'text-emerald-400' : ''}>{l.msg}</span>
        </div>
      ))}
    </div>
  );
}

function Controls({ isRunning, currentRound, maxRounds, setMaxRounds, onStart, onStop, onReset, hasRun }) {
  return (
    <section className="panel rounded-lg p-5">
      <div className="flex items-baseline gap-3 mb-3">
        <span className="font-mono text-[11px] tracking-widest text-[var(--amber)]">03 / CONTROL</span>
        <span className="text-sm text-[var(--text-dim)]">시뮬레이션 실행</span>
      </div>
      <div className="flex flex-wrap items-center gap-4">
        <div className="font-mono text-sm">
          <span className="text-[var(--text-faint)]">진행</span>{' '}
          <span className="text-2xl font-display font-bold text-[var(--amber)]">
            {String(currentRound).padStart(2, '0')}
          </span>
          <span className="text-[var(--text-faint)]">/{String(maxRounds).padStart(2, '0')}</span>
        </div>
        <div className="flex-1 h-1.5 bg-[var(--bg)] rounded-full overflow-hidden">
          <div className="h-full bg-gradient-to-r from-cyan-400 to-amber-400 transition-all"
               style={{ width: `${(currentRound / maxRounds) * 100}%` }} />
        </div>
        <label className="flex items-center gap-2 text-xs">
          <span className="text-[var(--text-faint)] font-mono">ROUNDS</span>
          <input type="number" min="1" max="20" value={maxRounds}
            disabled={isRunning}
            onChange={(e) => setMaxRounds(clamp(parseInt(e.target.value) || 10, 1, 20))}
            className="w-14 bg-[var(--bg)] border border-[var(--border)] rounded px-2 py-1 text-sm font-mono text-center disabled:opacity-50" />
        </label>
        {!isRunning ? (
          <button onClick={onStart}
            className="px-5 py-2 bg-[var(--amber)] text-black font-medium rounded text-sm hover:bg-amber-400 transition">
            ▶ {hasRun ? '재시작' : '시뮬레이션 시작'}
          </button>
        ) : (
          <button onClick={onStop}
            className="px-5 py-2 bg-rose-500 text-white font-medium rounded text-sm hover:bg-rose-400 transition">
            ■ 중단
          </button>
        )}
        <button onClick={onReset} disabled={isRunning}
          className="px-3 py-2 border border-[var(--border)] text-[var(--text-dim)] rounded text-sm hover:border-[var(--amber)] disabled:opacity-40 transition">
          ↺ 초기화
        </button>
      </div>
    </section>
  );
}

/* ============================================================
 * 4. 메인 앱
 * ============================================================ */
function App() {
  const [config, setConfig] = useState(() => ({
    scriptUrl: localStorage.getItem('gas_url') || '',
    apiKey: localStorage.getItem('gemini_key') || '',
    useServerKey: localStorage.getItem('use_server_key') === '1',
  }));
  useEffect(() => {
    localStorage.setItem('gas_url', config.scriptUrl);
    localStorage.setItem('gemini_key', config.apiKey);
    localStorage.setItem('use_server_key', config.useServerKey ? '1' : '0');
  }, [config]);

  const [topic, setTopic] = useState(DEFAULT_TOPIC);
  const makeInitialAgents = () => DEFAULT_AGENTS.map(a => ({
    ...a,
    attitude: a.initialAttitude,
    attitudeHistory: [{ round: 0, value: a.initialAttitude }],
    memories: [],
  }));
  const [agents, setAgents] = useState(makeInitialAgents);
  const [conversations, setConversations] = useState([]);
  const [currentRound, setCurrentRound] = useState(0);
  const [maxRounds, setMaxRounds] = useState(10);
  const [isRunning, setIsRunning] = useState(false);
  const [activePair, setActivePair] = useState(null);
  const [lastDeltas, setLastDeltas] = useState({}); // { agentId: delta }
  const [logs, setLogs] = useState([]);
  const stopRef = useRef(false);

  // 비동기 루프에서 최신 agents 상태를 읽기 위한 ref
  const agentsRef = useRef(agents);
  useEffect(() => { agentsRef.current = agents; }, [agents]);

  const log = useCallback((msg, kind = '') => {
    const t = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    setLogs(ls => [...ls.slice(-200), { t, msg, kind }]);
  }, []);

  const status = isRunning ? `R${currentRound} 실행 중` : (currentRound > 0 ? `R${currentRound} 완료` : '대기 중');

  /* ---- self test ---- */
  const onSelfTest = async () => {
    try {
      log('연결 테스트 → GET ' + config.scriptUrl);
      const res = await fetch(config.scriptUrl);
      const data = await res.json();
      log(`서버 응답: model=${data.model}, serverHasKey=${data.serverHasKey}`, 'ok');
    } catch (e) {
      log('연결 실패: ' + e.message, 'err');
    }
  };

  /* ---- 시뮬레이션 ---- */
  const runConversation = async (round, A, B) => {
    setActivePair([A.id, B.id]);
    log(`R${round} · ${A.name} ↔ ${B.name} 대화 생성 중…`);
    const prompt = buildPrompt(topic, A, B);

    let parsed = null;
    try {
      const text = await callBackend({
        scriptUrl: config.scriptUrl,
        apiKey: config.apiKey,
        useServerKey: config.useServerKey,
        prompt,
      });
      parsed = safeParseJSON(text);
      if (!parsed) throw new Error('JSON 파싱 실패');
    } catch (e) {
      log(`✗ ${A.name} ↔ ${B.name} 실패: ${e.message}`, 'err');
      return null;
    }

    const aNew = clamp(Math.round(parsed.a_new_attitude ?? A.attitude), -5, 5);
    const bNew = clamp(Math.round(parsed.b_new_attitude ?? B.attitude), -5, 5);
    const aDelta = aNew - A.attitude;
    const bDelta = bNew - B.attitude;

    return {
      round,
      agentAId: A.id, agentBId: B.id,
      dialogue: Array.isArray(parsed.dialogue) ? parsed.dialogue : [],
      aNew, bNew, aDelta, bDelta,
      aMemory: parsed.a_memory || '', bMemory: parsed.b_memory || '',
      aReason: parsed.a_reason || '', bReason: parsed.b_reason || '',
    };
  };

  const runRound = async (round) => {
    log(`━━━ ROUND ${round} 시작 ━━━`);
    // 최신 상태에서 페어링
    const currentAgents = agentsRef.current;
    const pairs = pairAgents(currentAgents);
    log(`페어링: ${pairs.map(([a, b]) => `${a.name}-${b.name}`).join(', ')}`);

    // 라운드 종료 시 σ를 정확히 찍기 위한 로컬 추적
    // (React setState 비동기 + ref 갱신 지연으로 마지막 페어 결과가 누락되는 것을 방지)
    const localAttitudes = new Map(currentAgents.map(a => [a.id, a.attitude]));

    for (const [A, B] of pairs) {
      if (stopRef.current) break;
      // 라운드 내 다른 페어가 같은 에이전트를 건드리지 않으므로 A, B 직접 사용
      const r = await runConversation(round, A, B);
      if (!r) continue;

      localAttitudes.set(A.id, r.aNew);
      localAttitudes.set(B.id, r.bNew);

      // 즉시 반영 (애니메이션 효과)
      setAgents(curr => curr.map(a => {
        if (a.id === A.id) return {
          ...a, attitude: r.aNew,
          attitudeHistory: [...a.attitudeHistory, { round, value: r.aNew }],
          memories: [...a.memories, r.aMemory].filter(Boolean).slice(-6),
        };
        if (a.id === B.id) return {
          ...a, attitude: r.bNew,
          attitudeHistory: [...a.attitudeHistory, { round, value: r.bNew }],
          memories: [...a.memories, r.bMemory].filter(Boolean).slice(-6),
        };
        return a;
      }));
      setLastDeltas(d => ({ ...d, [A.id]: r.aDelta, [B.id]: r.bDelta }));
      setConversations(cs => [...cs, { ...r, key: `${round}-${A.id}-${B.id}` }]);
    }

    // 미참여(실패)자 캐리포워드 → 그래프 연속성
    setAgents(curr => curr.map(a => {
      const has = a.attitudeHistory.some(h => h.round === round);
      return has ? a : { ...a, attitudeHistory: [...a.attitudeHistory, { round, value: a.attitude }] };
    }));

    setActivePair(null);
    const synth = currentAgents.map(a => ({ ...a, attitude: localAttitudes.get(a.id) }));
    log(`R${round} 완료 · σ=${polarization(synth).toFixed(2)}`, 'ok');
  };

  const onStart = async () => {
    if (!config.scriptUrl) { log('Apps Script URL을 입력하세요.', 'err'); return; }
    if (!config.useServerKey && !config.apiKey) { log('API 키 또는 서버 키 옵션이 필요합니다.', 'err'); return; }

    // 이미 끝난 상태에서 "재시작"을 눌렀으면 초기화부터
    let from = currentRound;
    if (currentRound >= maxRounds) {
      const fresh = makeInitialAgents();
      agentsRef.current = fresh;          // 동기적으로 ref도 갱신해 즉시 사용 가능하게
      setAgents(fresh);
      setConversations([]);
      setLastDeltas({});
      setCurrentRound(0);
      from = 0;
      log('재시작 · 초기 상태에서 다시 시작', 'ok');
    }

    stopRef.current = false;
    setIsRunning(true);
    log(`시뮬레이션 시작 · ${maxRounds} rounds × ${Math.floor(agents.length / 2)} pairs`);
    for (let r = from + 1; r <= maxRounds; r++) {
      if (stopRef.current) { log('사용자 중단', 'err'); break; }
      setCurrentRound(r);
      await runRound(r);
    }
    setIsRunning(false);
    setActivePair(null);
    log('━━━ 시뮬레이션 종료 ━━━', 'ok');
  };

  const onStop = () => { stopRef.current = true; };

  const onReset = () => {
    const fresh = makeInitialAgents();
    agentsRef.current = fresh;
    setAgents(fresh);
    setConversations([]);
    setCurrentRound(0);
    setLastDeltas({});
    setActivePair(null);
    log('초기 상태로 리셋', 'ok');
  };

  return (
    <div className="min-h-screen grain">
      <Header status={status} />

      <main className="max-w-[1600px] mx-auto px-6 py-6 space-y-6">
        <div className="grid lg:grid-cols-2 gap-6">
          <SetupPanel config={config} setConfig={setConfig} onSelfTest={onSelfTest} />
          <TopicPanel topic={topic} setTopic={setTopic} disabled={isRunning} />
        </div>

        <Controls
          isRunning={isRunning}
          currentRound={currentRound}
          maxRounds={maxRounds}
          setMaxRounds={setMaxRounds}
          onStart={onStart} onStop={onStop} onReset={onReset}
          hasRun={currentRound > 0}
        />

        <div className="grid xl:grid-cols-[2fr_3fr_3fr] gap-6">
          {/* Agents */}
          <section className="panel rounded-lg p-5">
            <div className="flex items-baseline gap-3 mb-4">
              <span className="font-mono text-[11px] tracking-widest text-[var(--amber)]">AGENTS</span>
              <span className="text-sm text-[var(--text-dim)]">10명의 시민</span>
            </div>
            <div className="grid sm:grid-cols-2 xl:grid-cols-1 gap-3">
              {agents.map(a => (
                <AgentCard key={a.id} agent={a}
                  isActive={activePair && activePair.includes(a.id)}
                  lastDelta={lastDeltas[a.id]} />
              ))}
            </div>
          </section>

          {/* Conversation Log */}
          <ConversationLog conversations={conversations} agents={agents} />

          {/* Chart + log */}
          <div className="space-y-6">
            <AttitudeChart agents={agents} currentRound={currentRound} />
            <StatusLog logs={logs} />
          </div>
        </div>

        <footer className="text-center text-[10px] font-mono text-[var(--text-faint)] py-8 border-t border-[var(--border)]">
          Generative Agent Simulation · React + Apps Script · Gemini 2.5 Flash Lite ·
          <span className="text-[var(--amber)]"> Computational Social Science</span>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
